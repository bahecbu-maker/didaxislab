<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Didaxis Lab — Recursos educativos interactivos</title>
<meta name="description" content="Simuladores y recursos educativos interactivos en español, de acceso libre para estudiantes y docentes. Próximamente.">
<style>
  :root{
    --ink:#16243A;
    --muted:#5B6B82;
    --bg:#FAFBFC;
    --accent:#5B47E0;
    --grid:rgba(22,36,58,0.045);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:32px 32px;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    max-width:560px;
    width:100%;
    text-align:center;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) both;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:28px;
  }
  .eyebrow::before{
    content:"";
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);
  }
  h1{
    font-size:clamp(44px,9vw,76px);
    font-weight:800;
    letter-spacing:-.03em;
    line-height:1;
  }
  h1 .lab{color:var(--accent);}
  .tagline{
    margin-top:20px;
    font-size:clamp(17px,3.5vw,20px);
    color:var(--muted);
    line-height:1.5;
  }
  .divider{
    width:48px;height:3px;border-radius:3px;
    background:var(--accent);
    margin:32px auto;
    opacity:.85;
  }
  .status{
    font-size:15px;
    color:var(--ink);
    font-weight:500;
  }
  .footer{
    margin-top:40px;
    font-size:13px;
    color:var(--muted);
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(16px);}
    to{opacity:1;transform:translateY(0);}
  }
  @media (prefers-reduced-motion:reduce){
    .card{animation:none;}
  }
</style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">En construcción</span>
    <h1>Didaxis <span class="lab">Lab</span></h1>
    <p class="tagline">Simuladores y recursos educativos interactivos en español, de acceso libre para estudiantes y docentes.</p>
    <div class="divider"></div>
    <p class="status">Próximamente</p>
    <p class="footer">Un proyecto de Héctor Banquez</p>
  </main>
</body>
</html>
